# Astro 项目部署到 GitHub Pages 的标准配置
name: Deploy Astro to GitHub Pages

on:
  # 推送到 main 分支时触发
  push:
    branches: ["main"]
  # 允许手动触发
  workflow_dispatch:

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 避免并发部署冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建 Astro 项目
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境（Astro 依赖 Node）
        uses: actions/setup-node@v4
        with:
          node-version: 20  # 推荐使用 LTS 版本
          cache: 'npm'      # 缓存依赖，加速构建

      - name: 安装依赖
        run: npm install

      - name: 构建 Astro 项目
        run: npm run build  # 执行 Astro 打包命令，产物输出到 dist 目录

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          # 指向 Astro 的构建输出目录（核心！）
          path: ./dist

  # 部署到 GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build  # 依赖 build 任务完成
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
